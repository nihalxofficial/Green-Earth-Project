<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- Tailwind and DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        *{
            font-family: "Inter", sans-serif;
        }
    </style>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-green-50">

    <main class="container mx-auto w-11/12 pt-25">
        <h2 class="text-[#15803D] font-bold text-3xl text-center mb-10">Choose Your Trees</h2>
        
        <div class="grid grid-cols-4 gap-10">

            <!-- Categories -->
            <div class="space-y-2">
                <h2 class="font-bold text-2xl mb-4">Categories</h2>
                <button id="all-tree-btn" class="btn btn-success w-full justify-start">All Trees</button>
                
                <!-- Categories Container -->
                <div id="categories-container" class="space-y-2">
                    <button class="btn justify-start bg-transparent w-full border-none">Medicine Tree</button>
                </div>
            </div>
            
            <!-- Trees -->
            <div class="col-span-2">
                <div id="tree-container" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    
                    <div class="card bg-white rounded-lg shadow-md p-4 space-y-2">
                        <div class="image w-full h-[150px] bg-gray-200 rounded-md">
                            <img src="" alt="">
                        </div>
                        <h2 class="font-semibold">Mango Tree</h2>
                        <p class="text-sm text-gray-600">A fast-growing tropical tree that produces delicious, juicy mangoes during summer. Its dense green</p>
                        <div class="flex justify-between">
                            <button class="bg-green-300 text-green rounded-full px-3">Fruit Tree</button>
                            <button class="font-semibold">৳500</button>
                        </div>
                        <button class="btn bg-green-700 text-white py-2 rounded-full">Add to Cart</button>
                    </div>

                </div>
            </div>
            
            <!-- Cart -->
            <div>Cart</div>
        </div>
    </main>
    


    <script src="./scripts/script.js"></script>
</body>
</html>
